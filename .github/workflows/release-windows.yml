name: Build and Release PhotonFinder for Windows

on:
  pull_request:
  push:
    branches:
      - master
    tags:
      - '[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]'  # matches YYYYMMDD

permissions:
  contents: write

jobs:
  build:
    name: Build Windows Executable
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --extra dev --extra build

      - name: Generate code from UI files
        run: uv run python setup.py build_ui

      # Test dataset — cached by dataset revision hash
      - name: Get dataset revision hash
        id: hf-hash
        shell: bash
        run: |
          uv run python - <<'EOF'
          from huggingface_hub import HfApi
          import os
          info = HfApi().dataset_info("bcolyn/PhotonFinder-test-data")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"revision={info.sha}\n")
          EOF

      - name: Cache Hugging Face dataset
        id: cache-testdata
        uses: actions/cache@v4
        with:
          path: tests/data
          key: hfdata-${{ steps.hf-hash.outputs.revision }}-${{ runner.os }}

      - name: Run tests
        run: uv run pytest tests/

      - name: Build with PyInstaller
        run: uv run --extra build pyinstaller --noconfirm photonfinder.spec

      - name: Zip the build
        run: |
          cd dist
          powershell Compress-Archive -Path main -DestinationPath photonfinder-${{ github.ref_name }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: photonfinder
          path: dist/photonfinder-${{ github.ref_name }}.zip

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')  # Only run for tags

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: photonfinder
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PhotonFinder ${{ github.ref_name }}
          files: dist/photonfinder-${{ github.ref_name }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
